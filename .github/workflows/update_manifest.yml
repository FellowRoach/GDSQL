name: Update File Manifest

on:
  push:
    tags:
      - "v*"

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for diff

      - name: Generate manifest diff
        run: |
          MANIFEST="addons/gdsql/tabs/plugin_updater/file_manifest.txt"
          TAG="${{ github.ref_name }}"
          # Find the previous version tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            echo "Previous tag: $PREV_TAG"
            # New files
            git diff --name-only --diff-filter=A "$PREV_TAG"...HEAD -- addons/gdsql/ | while read f; do
              echo "+,$TAG,$f" >> "$MANIFEST"
            done
            # Removed files
            git diff --name-only --diff-filter=D "$PREV_TAG"...HEAD -- addons/gdsql/ | while read f; do
              echo "-,$TAG,$f" >> "$MANIFEST"
            done
          else
            echo "No previous tag found, manifest unchanged."
          fi

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update file_manifest for ${{ github.ref_name }}"
          file_pattern: addons/gdsql/tabs/plugin_updater/file_manifest.txt
